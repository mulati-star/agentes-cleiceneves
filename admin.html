<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Gerenciar Acessos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  :root { --bg: #0d0007; --card: #1a0015; --pink: #FF2D78; --green: #22c55e; --green-dark: #16a34a; --red: #ef4444; --red-dark: #dc2626; --white: #fff; --muted: #9d7a93; --border: rgba(255,45,120,0.2); --border-gold: rgba(201,168,76,0.3); --gold: #c9a84c; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; padding: 40px 20px; }
  .bg-glow { position: fixed; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(255,45,120,0.08) 0%, transparent 70%); top: -150px; left: 50%; transform: translateX(-50%); pointer-events: none; }
  .container { max-width: 640px; margin: 0 auto; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .header h1 span { color: var(--pink); }
  .header p { font-size: 13px; color: var(--muted); }
  .card { background: var(--card); border: 1px solid var(--border-gold); border-radius: 16px; padding: 28px; margin-bottom: 20px; }
  .card h2 { font-size: 14px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; }
  .input-row { display: flex; gap: 10px; }
  input[type=text], input[type=password] { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--white); font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
  input[type=text]:focus, input[type=password]:focus { border-color: var(--pink); }
  input::placeholder { color: var(--muted); }
  .btn { border: none; border-radius: 10px; padding: 12px 20px; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap; }
  .btn:active { transform: scale(0.96); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-green:hover { background: var(--green-dark); }
  .btn-red { background: var(--red); color: #fff; }
  .btn-red:hover { background: var(--red-dark); }
  .btn-pink { background: var(--pink); color: #fff; }
  .btn-pink:hover { background: #e01f66; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .senha-lista { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .senha-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; }
  .senha-text { font-size: 14px; font-family: monospace; color: #e8d4e3; letter-spacing: 0.05em; }
  .senha-copy { background: transparent; border: 1px solid var(--border); border-radius: 7px; color: var(--muted); padding: 5px 10px; font-size: 11px; cursor: pointer; transition: all 0.2s; margin-right: 8px; }
  .senha-copy:hover { border-color: var(--pink); color: var(--pink); }
  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 20px; }
  .toast { position: fixed; bottom: 30px; right: 30px; background: var(--green); color: #fff; border-radius: 10px; padding: 12px 20px; font-size: 13px; font-weight: 600; transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 999; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: var(--red); }
  .admin-login { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
  .admin-login .card { width: 100%; max-width: 380px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--border-gold); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.1em; }
  .count-badge { background: var(--pink); color: #fff; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700; margin-left: 8px; }
  .gen-hint { font-size: 11px; color: var(--muted); margin-top: 8px; }
</style>
</head>
<body>
<div class="bg-glow"></div>

<div id="admin-login-screen" class="admin-login">
  <div class="badge">● Painel Admin</div>
  <div class="card">
    <h2>Acesso Restrito</h2>
    <div style="margin-bottom:16px;">
      <input type="password" id="admin-senha" placeholder="Senha do admin" style="width:100%;margin-bottom:10px;" />
      <button class="btn btn-pink" style="width:100%;" onclick="loginAdmin()">ENTRAR</button>
    </div>
    <div id="admin-error" style="display:none;color:#ff6b8a;font-size:13px;text-align:center;"></div>
  </div>
</div>

<div id="painel" style="display:none;">
  <div class="container">
    <div class="header">
      <h1>Painel de <span>Acessos</span></h1>
      <p>Gerencie as senhas dos compradores</p>
    </div>

    <div class="card">
      <h2>Adicionar Nova Senha <span id="count-badge" class="count-badge">0</span></h2>
      <div class="input-row">
        <input type="text" id="nova-senha" placeholder="Digite a senha ou gere automaticamente" />
        <button class="btn btn-green" onclick="adicionarSenha()" id="btn-add">ADICIONAR</button>
      </div>
      <div class="gen-hint">
        <button onclick="gerarSenha()" style="background:none;border:none;color:var(--pink);cursor:pointer;font-size:12px;padding:0;margin-top:8px;">✦ Gerar senha automática</button>
      </div>
    </div>

    <div class="card">
      <h2>Senhas Ativas</h2>
      <div class="senha-lista" id="senha-lista">
        <div class="empty">Carregando...</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const JSONBIN_KEY = '$2a$10$cOFM.YfFmyg92e6irmR4yOqeL7BkwHRdBEekHdTHqgTplPqxZxlji';
const JSONBIN_BIN = '6a32c6a1f5f4af5e2902df22';
const ADMIN_SENHA = 'admin@cleice2024'; // ALTERE AQUI

let senhasAtuais = [];

function loginAdmin() {
  const val = document.getElementById('admin-senha').value;
  if (val === ADMIN_SENHA) {
    document.getElementById('admin-login-screen').style.display = 'none';
    document.getElementById('painel').style.display = 'block';
    carregarSenhas();
  } else {
    document.getElementById('admin-error').style.display = 'block';
    document.getElementById('admin-error').textContent = 'Senha incorreta.';
  }
}
document.getElementById('admin-senha').addEventListener('keydown', e => { if (e.key === 'Enter') loginAdmin(); });

async function carregarSenhas() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    const data = await res.json();
    senhasAtuais = data.record?.senhas || [];
    renderSenhas();
  } catch(e) { mostrarToast('Erro ao carregar senhas', true); }
}

function renderSenhas() {
  const lista = document.getElementById('senha-lista');
  document.getElementById('count-badge').textContent = senhasAtuais.length;
  if (senhasAtuais.length === 0) { lista.innerHTML = '<div class="empty">Nenhuma senha cadastrada ainda.</div>'; return; }
  lista.innerHTML = senhasAtuais.map((s, i) => `
    <div class="senha-item" id="item-${i}">
      <span class="senha-text">${s}</span>
      <div>
        <button class="senha-copy" onclick="copiar('${s}')">Copiar</button>
        <button class="btn btn-red" style="padding:6px 12px;font-size:11px;" onclick="removerSenha(${i})">Remover</button>
      </div>
    </div>
  `).join('');
}

async function salvarSenhas() {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
    body: JSON.stringify({ senhas: senhasAtuais })
  });
  if (!res.ok) throw new Error('Erro ao salvar');
}

async function adicionarSenha() {
  const input = document.getElementById('nova-senha');
  const senha = input.value.trim();
  if (!senha) { mostrarToast('Digite uma senha', true); return; }
  if (senhasAtuais.includes(senha)) { mostrarToast('Essa senha já existe', true); return; }
  const btn = document.getElementById('btn-add');
  btn.disabled = true; btn.textContent = '...';
  try {
    senhasAtuais.push(senha);
    await salvarSenhas();
    input.value = '';
    renderSenhas();
    mostrarToast('Senha adicionada! ✓');
  } catch(e) { senhasAtuais.pop(); mostrarToast('Erro ao salvar', true); }
  btn.disabled = false; btn.textContent = 'ADICIONAR';
}

async function removerSenha(idx) {
  if (!confirm(`Remover a senha "${senhasAtuais[idx]}"? O acesso será bloqueado imediatamente.`)) return;
  const removida = senhasAtuais.splice(idx, 1)[0];
  try {
    await salvarSenhas();
    renderSenhas();
    mostrarToast(`Senha "${removida}" removida ✓`);
  } catch(e) { senhasAtuais.splice(idx, 0, removida); mostrarToast('Erro ao remover', true); }
}

function gerarSenha() {
  const adjs = ['bunita','bunito','viral','pink','nova','top','estrela','veloz'];
  const nums = Math.floor(1000 + Math.random() * 9000);
  const senha = adjs[Math.floor(Math.random() * adjs.length)] + nums;
  document.getElementById('nova-senha').value = senha;
}

function copiar(texto) {
  navigator.clipboard.writeText(texto).then(() => mostrarToast('Copiado! ✓'));
}

function mostrarToast(msg, erro = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (erro ? ' error' : '') + ' show';
  setTimeout(() => t.className = 'toast' + (erro ? ' error' : ''), 2500);
}
</script>
</body>
</html>
